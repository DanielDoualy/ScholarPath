services:
  - type: web
    name: scholarpath-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn backend.wsgi --log-file -"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://scholarpath.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: scholarpath-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false        # à saisir manuellement dans le dashboard Render
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: USE_S3
        value: "False"

databases:
  - name: scholarpath-db
    databaseName: scholarpath
    user: scholarpath
    plan: free
